services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_name
      - db_user
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d $$(cat /run/secrets/db_name)"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    image: $REGISTRY_IMAGE/seed:latest
    deploy:
      resources:
        limits:
          memory: 1800m
    build:
      context: .
      dockerfile: seed/dockerfile
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      ADMIN_USERNAME_FILE: /run/secrets/admin_username
      ADMIN_EMAIL_FILE: /run/secrets/admin_email
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CSV_PATH: data/Music Info.csv
      CSV_LISTENING_HISTORY_PATH: data/User Listening History.csv
      HDF5_PATH: data/msd_summary_file.h5
      CHUNK_SIZE: 5000
      NO_OF_CHUNKS: 5
      PYTHONDONTWRITEBYTECODE: 1
    secrets:
      - db_name
      - db_user
      - db_password
      - admin_username
      - admin_email
      - admin_password
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/models
      - /srv/tracks-api/data:/app/data
    restart: "no"
  
  auth-service:
    image: $REGISTRY_IMAGE/auth-service:latest
    build:
      context: .
      dockerfile: auth-service/dockerfile
      args:
        AUTH_PORT: 5020
    environment:
      FLASK_HOST: 0.0.0.0
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BASE_URL: https://patriciaj.se
      PATH_PREFIX: /tracks-api/auth
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      FLASK_SECRET_KEY_FILE: /run/secrets/flask_secret_key
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
      PYTHONDONTWRITEBYTECODE: 1
    secrets:
      - db_name
      - db_user
      - db_password
      - flask_secret_key
      - jwt_private_key
      - jwt_public_key
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    ports:
      - "5020:5020"
    volumes:
      - ./models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5020/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  tracks-api:
    image: $REGISTRY_IMAGE/tracks-api:latest
    build:
      context: .
      dockerfile: tracks-api/dockerfile
      args:
        TRACKS_PORT: 5010
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BASE_URL: https://patriciaj.se
      ROOT_PATH: /tracks-api
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
      PYTHONDONTWRITEBYTECODE: 1
    secrets:
      - db_name
      - db_user
      - db_password
      - jwt_public_key
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    ports:
      - "5010:5010"
    volumes:
      - ./models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5010/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

secrets:
  admin_username:
    file: /srv/tracks-api/secrets/admin_username.txt
  admin_email:
    file: /srv/tracks-api/secrets/admin_email.txt
  admin_password:
    file: /srv/tracks-api/secrets/admin_password.txt
  db_name:
    file: /srv/tracks-api/secrets/db_name.txt
  db_user:
    file: /srv/tracks-api/secrets/db_user.txt
  db_password:
    file: /srv/tracks-api/secrets/db_password.txt
  flask_secret_key:
    file: /srv/tracks-api/secrets/flask_secret_key.txt
  jwt_private_key:
    file: /srv/tracks-api/secrets/tracks-api-jwt-key
  jwt_public_key:
    file: /srv/tracks-api/secrets/tracks-api-jwt-key.pub

volumes:
  postgres_data:
